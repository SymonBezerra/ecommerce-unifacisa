{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('users.static', filename='styles.css') }}">
{% endblock %}

{% block content %}
<h1>Users</h1>
<div class="users-create-div">
    <a href="{{ url_for('users.create') }}" class="users-create-btn">Create New User</a>
</div>

<div class="users-listing" x-data="listUsers()">
    {% for user in users %}
    <div class="user-item">
        <div>
            <h2>User #{{ user.id }}</h2>
            <p>{{ user.username }}</p>
        </div>
        <div style="flex: 1;"></div>
        <a class="user-edit" href="{{ url_for('users.edit', user_id=user.id)}}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
            </svg>
        </a>
        <div class="user-remove" x-on:click="deleteUser({{ user.id }})">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m6 4.125 2.25 2.25m0 0 2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
            </svg>
        </div>
    </div>
    {% endfor %}
</div>

<script src="{{ url_for('users.static', filename='js/list.js') }}"></script>
{% endblock %}
